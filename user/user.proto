syntax = "proto3";

package user;

option go_package = "github.com/IK-akx/pharmacy-proto-gen/user;userpb";

message RegisterRequest {
  string email      = 1;
  string password   = 2;
  string first_name = 3;
  string last_name  = 4;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message AuthResponse {
  string token      = 1;
  string user_id    = 2;
  string email      = 3;
  string first_name = 4;
  string last_name  = 5;
  string role       = 6;
}

message GetProfileRequest {
  string user_id = 1;
}

message UpdateProfileRequest {
  string user_id    = 1;
  string first_name = 2;
  string last_name  = 3;
  string phone      = 4;
}

message UserResponse {
  string user_id    = 1;
  string email      = 2;
  string first_name = 3;
  string last_name  = 4;
  string phone      = 5;
  string role       = 6;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool   valid   = 1;
  string user_id = 2;
  string role    = 3;
}


service UserService {
  rpc RegisterUser      (RegisterRequest)      returns (AuthResponse);
  rpc LoginUser         (LoginRequest)         returns (AuthResponse);
  rpc GetUserProfile    (GetProfileRequest)    returns (UserResponse);
  rpc UpdateUserProfile (UpdateProfileRequest) returns (UserResponse);
  rpc ValidateToken     (ValidateTokenRequest) returns (ValidateTokenResponse);
}