syntax = "proto3";

package order;

option go_package = "github.com/IKakx/pharmacy-proto-gen/order";

import "google/protobuf/timestamp.proto";

// OrderService — 5 gRPC endpoints
service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder(GetOrderRequest) returns (OrderResponse);
  rpc GetUserOrders(GetUserOrdersRequest) returns (ListOrdersResponse);
  rpc CancelOrder(CancelOrderRequest) returns (OrderResponse);
  rpc GetUserBalance(GetBalanceRequest) returns (BalanceResponse);
}

// Messages
message CreateOrderRequest {
  string user_id = 1;
  repeated OrderItemRequest items = 2;
}

message OrderItemRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message GetOrderRequest {
  string order_id = 1;
}

message GetUserOrdersRequest {
  string user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message CancelOrderRequest {
  string order_id = 1;
}

message GetBalanceRequest {
  string user_id = 1;
}

// Responses
message OrderResponse {
  string id = 1;
  string user_id = 2;
  string status = 3;
  double total = 4;
  repeated OrderItemResponse items = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message OrderItemResponse {
  string id = 1;
  string product_id = 2;
  int32 quantity = 3;
  double price = 4;
}

message ListOrdersResponse {
  repeated OrderResponse orders = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 limit = 4;
}

message BalanceResponse {
  string user_id = 1;
  double balance = 2;
  google.protobuf.Timestamp updated_at = 3;
}