syntax = "proto3";

package product;

option go_package = "github.com/IK-akx/pharmacy-proto-gen/product";

import "google/protobuf/timestamp.proto";

service ProductService {
  rpc CreateProduct(CreateProductRequest) returns (ProductResponse);
  rpc GetProduct(GetProductRequest) returns (ProductResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc CheckAvailability(CheckAvailabilityRequest) returns (AvailabilityResponse);
  rpc UpdateStock(UpdateStockRequest) returns (StockResponse);
}

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  string category_id = 4;
  double price = 5;
  int32 stock = 6;
  string manufacturer = 7;
  bool requires_rx = 8;
  string image_url = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  string category_id = 3;
  double price = 4;
  int32 stock = 5;
  string manufacturer = 6;
  bool requires_rx = 7;
  string image_url = 8;
}

message GetProductRequest {
  string id = 1;
}

message ListProductsRequest {
  int32 page = 1;
  int32 limit = 2;
}

message ProductResponse {
  Product product = 1;
}

message ListProductsResponse {
  repeated Product products = 1;
  int32 total = 2;
}

message CheckAvailabilityRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message AvailabilityResponse {
  bool available = 1;
  int32 current_stock = 2;
}

message UpdateStockRequest {
  string product_id = 1;
  int32 quantity_delta = 2;
}

message StockResponse {
  bool success = 1;
  int32 new_stock = 2;
}